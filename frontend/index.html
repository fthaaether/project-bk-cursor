<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Sistem BK</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-header">
        <div class="icon">🎓</div>
        <h1>Sistem <span style="color:#F59E0B">Bimbingan Konseling</span></h1>
        <p>SMK — Platform Konseling Siswa</p>
      </div>
      <div class="login-body">
        <div id="login-alert"></div>
        <form id="login-form">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="Masukkan username" required autocomplete="username">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="Masukkan password" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary btn-block" style="margin-top:0.5rem">Masuk</button>
        </form>
      </div>
      <div class="login-footer">
        Demo: admin/admin123 · guru1/guru123 · siswa1/siswa123
      </div>
    </div>
  </div>
  <script src="js/app.js"></script>
  <script>initLogin();</script>
</body>
</html>
