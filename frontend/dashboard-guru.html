<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Guru BK — Sistem BK</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">🎓 Sistem <span>BK</span></div>
    <div class="navbar-user" id="navbar-user"></div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h2>Dashboard Guru BK</h2>
      <p>Kelola pertemuan, catatan konseling, dan laporan</p>
    </div>

    <div id="alert"></div>

    <div class="stats-grid">
      <div class="stat-card"><h3 id="stat-total">0</h3><p>Total Pertemuan</p></div>
      <div class="stat-card"><h3 id="stat-menunggu">0</h3><p>Menunggu</p></div>
      <div class="stat-card"><h3 id="stat-selesai">0</h3><p>Selesai</p></div>
    </div>

    <div class="card">
      <h3 class="card-title">Export Laporan PDF</h3>
      <div class="filter-bar">
        <div class="form-group">
          <label>Dari Tanggal</label>
          <input type="date" id="filter-dari" class="form-control">
        </div>
        <div class="form-group">
          <label>Sampai Tanggal</label>
          <input type="date" id="filter-sampai" class="form-control">
        </div>
        <button class="btn btn-primary" id="btn-export">📄 Unduh PDF</button>
      </div>
    </div>

    <div class="card">
      <h3 class="card-title">Daftar Pertemuan</h3>
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Siswa</th>
              <th>Tanggal</th>
              <th>Kategori</th>
              <th>Keperluan</th>
              <th>Status</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="pertemuan-table">
            <tr><td colspan="6" class="empty-state">Memuat data...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal Selesaikan -->
  <div class="modal-overlay" id="modal-selesai">
    <div class="modal">
      <div class="modal-header">
        <h3>Selesaikan Pertemuan</h3>
        <button class="modal-close" onclick="closeModal('modal-selesai')">&times;</button>
      </div>
      <form id="form-selesai">
        <input type="hidden" id="selesai-pertemuan-id">
        <div class="modal-body">
          <div class="form-group">
            <label>Isi Catatan Konseling</label>
            <textarea name="isi_catatan" class="form-control" rows="4" placeholder="Catatan hasil konseling..." required></textarea>
          </div>
          <div class="form-group">
            <label>Tindak Lanjut</label>
            <textarea name="tindak_lanjut" class="form-control" rows="3" placeholder="Rencana tindak lanjut..."></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeModal('modal-selesai')">Batal</button>
          <button type="submit" class="btn btn-primary">Simpan & Selesaikan</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>initGuruDashboard();</script>
</body>
</html>
