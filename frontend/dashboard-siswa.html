<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Siswa — Sistem BK</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">🎓 Sistem <span>BK</span></div>
    <div class="navbar-user" id="navbar-user"></div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h2>Dashboard Siswa</h2>
      <p>Kelola jadwal dan pengajuan konseling Anda</p>
    </div>

    <div id="alert"></div>

    <div class="stats-grid">
      <div class="stat-card"><h3 id="stat-total">0</h3><p>Total Pertemuan</p></div>
      <div class="stat-card"><h3 id="stat-menunggu">0</h3><p>Menunggu Persetujuan</p></div>
      <div class="stat-card"><h3 id="stat-selesai">0</h3><p>Selesai</p></div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem">
        <h3 class="card-title" style="margin:0;border:none;padding:0">Daftar Pertemuan</h3>
        <button class="btn btn-primary" id="btn-ajuan">+ Ajukan Pertemuan</button>
      </div>
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Tanggal</th>
              <th>Guru BK</th>
              <th>Kategori</th>
              <th>Keperluan</th>
              <th>Status</th>
              <th>Catatan</th>
            </tr>
          </thead>
          <tbody id="pertemuan-table">
            <tr><td colspan="6" class="empty-state">Memuat data...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal Ajuan -->
  <div class="modal-overlay" id="modal-ajuan">
    <div class="modal">
      <div class="modal-header">
        <h3>Ajukan Pertemuan Konseling</h3>
        <button class="modal-close" onclick="closeModal('modal-ajuan')">&times;</button>
      </div>
      <form id="ajuan-form">
        <div class="modal-body">
          <div class="form-group">
            <label>Guru BK</label>
            <select name="guru_bk_id" id="guru_bk_id" class="form-control" required></select>
          </div>
          <div class="form-group">
            <label>Kategori</label>
            <select name="kategori_id" id="kategori_id" class="form-control" required></select>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Jenis</label>
              <select name="jenis" class="form-control">
                <option value="individu">Individu</option>
                <option value="kelompok">Kelompok</option>
              </select>
            </div>
            <div class="form-group">
              <label>Tanggal</label>
              <input type="date" name="tanggal" class="form-control" required>
            </div>
          </div>
          <div class="form-group">
            <label>Keperluan / Alasan</label>
            <textarea name="keperluan" class="form-control" rows="3" placeholder="Jelaskan keperluan konseling..." required></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeModal('modal-ajuan')">Batal</button>
          <button type="submit" class="btn btn-primary">Kirim Pengajuan</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>initSiswaDashboard();</script>
</body>
</html>
